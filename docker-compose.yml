version: "3.9"

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build: .

    environment:
      REDIS_URL: redis://redis:6379/0

    ports:
      - "8000:8000"

    depends_on:
      - redis

    volumes:
      - .:/app

  worker:
    build: .

    command: celery -A app.core.celery_app worker --loglevel=info

    environment:
      REDIS_URL: redis://redis:6379/0

    depends_on:
      - redis

    volumes:
      - .:/app